<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{CONCEPT}} — UI Research</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #fafaf9;
            --bg-secondary: #f5f5f4;
            --bg-tertiary: #e7e5e4;
            --bg-elevated: #ffffff;
            --text-primary: #1c1917;
            --text-secondary: #57534e;
            --text-tertiary: #a8a29e;
            --border-subtle: #e7e5e4;
            --border-default: #d6d3d1;
            --accent-primary: #0c0a09;
            --accent-hover: #292524;
            --success: #15803d;
            --success-bg: #dcfce7;
            --warning: #a16207;
            --warning-bg: #fef3c7;
            --focus-ring: rgba(12, 10, 9, 0.15);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06), 0 1px 3px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.08), 0 2px 6px rgba(0, 0, 0, 0.04);
            --radius-sm: 4px;
            --radius-md: 6px;
            --radius-lg: 8px;
            --font-sans: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html { 
            font-size: 15px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        .app {
            display: flex;
            min-height: 100vh;
        }
        
        /* Sidebar */
        .sidebar {
            background: var(--bg-elevated);
            border-right: 1px solid var(--border-subtle);
            padding: 32px 0;
            position: fixed;
            left: 0;
            top: 0;
            width: 220px;
            height: 100vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }
        
        .sidebar-header {
            padding: 0 20px 24px;
            border-bottom: 1px solid var(--border-subtle);
            margin-bottom: 16px;
        }
        
        .sidebar-brand {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-tertiary);
            margin-bottom: 4px;
        }
        
        .sidebar-concept {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            line-height: 1.4;
        }
        
        .sidebar-section {
            padding: 0 12px;
        }
        
        .sidebar-title {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-tertiary);
            padding: 0 8px;
            margin-bottom: 8px;
        }
        
        .sidebar-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 7px 10px;
            border: none;
            background: none;
            font-family: inherit;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: var(--radius-md);
            text-align: left;
            transition: all 0.15s var(--ease-out-expo);
        }
        
        .sidebar-item:hover { 
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
        
        .sidebar-item.active {
            background: var(--accent-primary);
            color: white;
        }
        
        .sidebar-item.active .sidebar-count {
            color: rgba(255, 255, 255, 0.7);
        }
        
        .sidebar-count {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-tertiary);
            background: var(--bg-secondary);
            padding: 2px 6px;
            border-radius: var(--radius-sm);
        }
        
        .sidebar-item.active .sidebar-count {
            background: rgba(255, 255, 255, 0.15);
        }
        
        .sidebar-footer {
            margin-top: auto;
            padding: 16px 20px;
            border-top: 1px solid var(--border-subtle);
        }
        
        .keyboard-hints {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .kbd-hint {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: var(--text-tertiary);
        }
        
        kbd {
            font-family: var(--font-mono);
            font-size: 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-default);
            border-radius: 3px;
            padding: 2px 5px;
            box-shadow: 0 1px 0 var(--border-default);
        }
        
        /* Main Content */
        .main {
            flex: 1;
            margin-left: 220px;
            padding: 32px 48px;
            min-width: 0;
        }
        
        .main-inner {
            max-width: 720px;
        }
        
        .header {
            margin-bottom: 24px;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }
        
        .stats {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-tertiary);
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        .stat-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        
        .stat-value {
            font-weight: 500;
            color: var(--text-secondary);
        }
        
        /* Search */
        .search-bar {
            position: relative;
            margin-bottom: 20px;
        }
        
        .search-bar input {
            width: 100%;
            padding: 10px 14px;
            padding-right: 70px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 13px;
            color: var(--text-primary);
            outline: none;
            transition: all 0.15s var(--ease-out-expo);
            box-shadow: var(--shadow-sm);
        }
        
        .search-bar input::placeholder {
            color: var(--text-tertiary);
        }
        
        .search-bar input:focus { 
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--focus-ring);
        }
        
        .search-kbd {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 2px;
        }
        
        /* Filters */
        .filters {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .filter-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border: 1px solid var(--border-default);
            background: var(--bg-elevated);
            border-radius: 100px;
            font-family: inherit;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s var(--ease-out-expo);
            white-space: nowrap;
        }
        
        .filter-chip:hover {
            background: var(--bg-secondary);
            border-color: var(--border-default);
        }
        
        .filter-chip.active {
            background: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
        }
        
        .filter-chip.active .chip-dot,
        .filter-chip.active .chip-count {
            opacity: 0.7;
        }
        
        .chip-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--chip-color, var(--text-tertiary));
        }
        
        .filter-chip.active .chip-dot {
            background: white;
        }
        
        .chip-count {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-tertiary);
        }
        
        .tag-chips {
            margin-bottom: 24px;
        }
        
        /* Reference List - List View */
        .ref-list {
            display: flex;
            flex-direction: column;
        }
        
        .ref-list.grid-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        
        /* List View Item */
        .ref-item {
            display: grid;
            grid-template-columns: 32px 1fr auto;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            text-decoration: none;
            color: inherit;
            border-bottom: 1px solid var(--border-subtle);
            transition: all 0.15s var(--ease-out-expo);
        }
        
        .ref-item:first-child {
            border-top: 1px solid var(--border-subtle);
        }
        
        .ref-item:hover {
            background: var(--bg-secondary);
            margin: 0 -12px;
            padding: 12px;
            border-radius: var(--radius-md);
            border-color: transparent;
        }
        
        .ref-item:hover + .ref-item {
            border-top-color: transparent;
        }
        
        .ref-item:hover .ref-arrow { 
            opacity: 1;
            transform: translateX(0);
        }
        
        .ref-item:hover .ref-title {
            color: var(--accent-primary);
        }
        
        /* List View with Previews */
        .ref-list.show-previews .ref-item {
            grid-template-columns: 32px 80px 1fr auto;
        }
        
        /* Grid View Item */
        .ref-list.grid-view .ref-item {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 0;
            padding: 0;
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            background: var(--bg-elevated);
            overflow: hidden;
        }
        
        .ref-list.grid-view .ref-item:first-child {
            border-top: 1px solid var(--border-subtle);
        }
        
        .ref-list.grid-view .ref-item:hover {
            margin: 0;
            padding: 0;
            box-shadow: var(--shadow-md);
            border-color: var(--border-default);
        }
        
        .ref-list.grid-view .ref-index {
            display: none;
        }
        
        .ref-list.grid-view .ref-content {
            padding: 12px;
        }
        
        .ref-list.grid-view .ref-arrow {
            display: none;
        }
        
        /* Reference Index Number */
        .ref-index {
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 500;
            color: var(--text-tertiary);
            background: var(--bg-secondary);
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            flex-shrink: 0;
        }
        
        .ref-item:hover .ref-index {
            background: var(--bg-tertiary);
        }
        
        /* Reference Image */
        .ref-image-wrap {
            display: none;
            width: 80px;
            height: 52px;
            flex-shrink: 0;
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: var(--bg-secondary);
        }
        
        .show-previews .ref-image-wrap {
            display: block;
        }
        
        .grid-view .ref-image-wrap {
            display: block;
            width: 100%;
            height: 140px;
            border-radius: 0;
        }
        
        .ref-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .ref-image.error {
            display: none;
        }
        
        .ref-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 14px;
        }
        
        .grid-view .ref-placeholder {
            font-size: 20px;
        }
        
        .placeholder-label {
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }
        
        /* Reference Content */
        .ref-content { 
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .ref-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        
        .ref-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            transition: color 0.15s var(--ease-out-expo);
        }
        
        .quality-badge {
            font-family: var(--font-mono);
            font-size: 9px;
            font-weight: 500;
            padding: 2px 5px;
            border-radius: 3px;
        }
        
        .quality-high {
            background: var(--success-bg);
            color: var(--success);
        }
        
        .quality-low {
            background: var(--warning-bg);
            color: var(--warning);
        }
        
        .ref-tag {
            font-family: var(--font-mono);
            font-size: 10px;
            padding: 2px 6px;
            background: var(--bg-secondary);
            border-radius: 3px;
            color: var(--text-tertiary);
        }
        
        .ref-arrow {
            font-size: 13px;
            opacity: 0;
            color: var(--text-tertiary);
            transition: all 0.15s var(--ease-out-expo);
            transform: translateX(-4px);
            align-self: center;
        }
        
        .ref-desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .ref-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
        }
        
        .ref-source {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .source-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }
        
        .ref-url {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-tertiary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 200px;
        }
        
        .tag-pill {
            font-family: var(--font-mono);
            font-size: 10px;
            padding: 1px 5px;
            background: var(--bg-secondary);
            border-radius: 3px;
            color: var(--text-tertiary);
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 64px 32px;
            color: var(--text-tertiary);
        }
        
        .empty-icon {
            font-size: 32px;
            margin-bottom: 12px;
            opacity: 0.5;
        }
        
        .empty-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        
        .empty-desc {
            font-size: 13px;
        }
        
        /* Floating Toolbar */
        .toolbar {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--bg-elevated);
            padding: 6px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-subtle);
        }
        
        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 2px;
        }
        
        .toolbar-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 12px;
            background: none;
            border: none;
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s var(--ease-out-expo);
        }
        
        .toolbar-btn:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
        
        .toolbar-btn.active {
            background: var(--accent-primary);
            color: white;
        }
        
        .toolbar-btn svg {
            width: 16px;
            height: 16px;
        }
        
        .toolbar-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            background: none;
            border: none;
            font-family: inherit;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
        }
        
        .toolbar-toggle:hover {
            color: var(--text-primary);
        }
        
        .toggle-track {
            width: 32px;
            height: 18px;
            background: var(--bg-tertiary);
            border-radius: 9px;
            position: relative;
            transition: background 0.15s var(--ease-out-expo);
        }
        
        .toggle-track::after {
            content: '';
            position: absolute;
            left: 2px;
            top: 2px;
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
            transition: transform 0.15s var(--ease-out-expo);
        }
        
        .toolbar-toggle.active .toggle-track {
            background: var(--accent-primary);
        }
        
        .toolbar-toggle.active .toggle-track::after {
            transform: translateX(14px);
        }
        
        .toolbar-toggle.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .toolbar-toggle.disabled:hover {
            color: var(--text-secondary);
        }
        
        .toolbar-divider {
            width: 1px;
            height: 24px;
            background: var(--border-subtle);
            margin: 0 4px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .app {
                grid-template-columns: 1fr;
            }
            .sidebar { 
                display: none; 
            }
            .main { 
                margin-left: 0; 
                padding: 20px; 
            }
            .toolbar {
                bottom: 16px;
                right: 16px;
                left: 16px;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <nav class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">UI Research</div>
                <div class="sidebar-concept" id="sidebar-concept">Loading...</div>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-title">Categories</div>
                <div id="sidebar-items"></div>
            </div>
            <div class="sidebar-footer">
                <div class="keyboard-hints">
                    <span class="kbd-hint"><kbd>⌘</kbd><kbd>K</kbd> Search</span>
                    <span class="kbd-hint"><kbd>←</kbd><kbd>→</kbd> Navigate</span>
                    <span class="kbd-hint"><kbd>Esc</kbd> Reset</span>
                </div>

        </nav>
        <main class="main">
            <header class="header">
                <h1 id="concept-title">UI Research</h1>

            </div>
            <div class="filters" id="source-chips"></div>
            <div class="filters tag-chips" id="tag-chips"></div>
            <div class="ref-list" id="ref-list"></div>
        </main>
    </div>
    <div class="toolbar">
        <button class="toolbar-toggle" id="toggle-previews" title="Toggle image previews">
            <span>Previews</span>
            <span class="toggle-track"></span>
        </button>
        <div class="toolbar-divider"></div>
        <div class="toolbar-group">
            <button class="toolbar-btn active" id="view-grid" title="Grid view">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="1" y="1" width="6" height="6" rx="1"/>
                    <rect x="9" y="1" width="6" height="6" rx="1"/>

                    <rect x="9" y="9" width="6" height="6" rx="1"/>
                </svg>
            </button>
            <button class="toolbar-btn" id="view-list" title="List view">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <line x1="1" y1="3" x2="15" y2="3"/>
                    <line x1="1" y1="8" x2="15" y2="8"/>
                    <line x1="1" y1="13" x2="15" y2="13"/>
                </svg>
            </button>
        </div>
    </div>

            "allTags": ["kanban", "timeline", "calendar", "tasks", "productivity", "saas", "notion", "react", "code", "dashboard", "minimal", "mobile"],
            "tier": 2,
            "generatedAt": "2026-04-12T20:30:00"

        let state = {
            category: 'all',
            sources: [],
            tags: [],
            search: '',
            showPreviews: false,
            viewMode: 'grid' // 'grid' or 'list'
        };
        
        function generateStats() {
            if (!data || !data.refs) return '';
            const total = data.refs.length;
            const withImages = data.refs.filter(r => r.img).length;
            const sourceCount = new Set(data.refs.map(r => r.source)).size;
            
            return `
                <span class="stat-item"><span class="stat-value">${total}</span> references</span>
                <span class="stat-item"><span class="stat-value">${sourceCount}</span> sources</span>
                <span class="stat-item"><span class="stat-value">${withImages}</span> with images</span>
            `;
        }
        
        function init() {
            if (!data) {
                document.getElementById('ref-list').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">◇</div>
                        <div class="empty-title">No data loaded</div>
                        <div class="empty-desc">This is the gallery template preview.</div>
                    </div>
                `;
                return;
            }
            document.getElementById('concept-title').textContent = data.concept || 'UI Research';
            document.getElementById('sidebar-concept').textContent = data.concept || 'UI Research';
            document.getElementById('stats').innerHTML = generateStats();
            parseHash();
            render();
        }
        
        function parseHash() {
            const hash = window.location.hash.slice(1);
            const params = new URLSearchParams(hash);
            if (params.get('category')) state.category = params.get('category');
            if (params.get('source')) state.sources = params.get('source').split(',');
            if (params.get('tags')) state.tags = params.get('tags').split(',');
            if (params.get('search')) state.search = params.get('search');
            if (params.get('previews') === 'true') state.showPreviews = true;
            if (params.get('view')) state.viewMode = params.get('view');
        }
        
        function updateHash() {
            const params = new URLSearchParams();
            if (state.category !== 'all') params.set('category', state.category);
            if (state.sources.length) params.set('source', state.sources.join(','));
            if (state.tags.length) params.set('tags', state.tags.join(','));
            if (state.search) params.set('search', state.search);
            if (state.showPreviews) params.set('previews', 'true');
            if (state.viewMode !== 'grid') params.set('view', state.viewMode);
            window.location.hash = params.toString();
        }
        
        function filterRefs() {
            if (!data || !data.refs) return [];
            return data.refs.filter(ref => {
                const matchesCat = state.category === 'all' || ref.cat === state.category;
                const matchesSource = state.sources.length === 0 || state.sources.includes(ref.source);
                const matchesTags = state.tags.length === 0 || state.tags.some(t => ref.tags && ref.tags.includes(t));
                const matchesSearch = !state.search || 
                    ref.title.toLowerCase().includes(state.search.toLowerCase()) ||
                    (ref.desc && ref.desc.toLowerCase().includes(state.search.toLowerCase()));
                return matchesCat && matchesSource && matchesTags && matchesSearch;
            });
        }
        
        function renderSidebar() {
            if (!data || !data.categories) return;
            const el = document.getElementById('sidebar-items');
            el.innerHTML = data.categories.map(cat => `
                <button class="sidebar-item ${state.category === cat.id ? 'active' : ''}" data-cat="${cat.id}">
                    <span class="sidebar-label">${cat.label}</span>
                    <span class="sidebar-count">${cat.count}</span>
                </button>
            `).join('');
            el.querySelectorAll('.sidebar-item').forEach(btn => {
                btn.onclick = () => { state.category = btn.dataset.cat; updateHash(); render(); };
            });
        }
        
        function renderSourceChips() {
            if (!data || !data.sources) return;
            const el = document.getElementById('source-chips');
            // Skip "all" source for chips
            const sources = data.sources.filter(s => s.id !== 'all');
            el.innerHTML = sources.map(src => `
                <button class="filter-chip ${state.sources.includes(src.id) ? 'active' : ''}" 
                        data-source="${src.id}" style="--chip-color: ${src.color}">
                    <span class="chip-dot"></span>
                    ${src.label}
                    <span class="chip-count">${src.count}</span>
                </button>
            `).join('');
            el.querySelectorAll('.filter-chip').forEach(btn => {
                btn.onclick = () => {
                    const src = btn.dataset.source;
                    const idx = state.sources.indexOf(src);
                    if (idx >= 0) state.sources.splice(idx, 1);
                    else state.sources.push(src);
                    updateHash();
                    render();
                };
            });
        }
        
        function renderTagChips() {
            if (!data || !data.allTags || data.allTags.length === 0) {
                document.getElementById('tag-chips').style.display = 'none';
                return;
            }
            document.getElementById('tag-chips').style.display = 'flex';
            const el = document.getElementById('tag-chips');
            const tags = data.allTags.slice(0, 12);
            el.innerHTML = tags.map(tag => `
                <button class="filter-chip ${state.tags.includes(tag) ? 'active' : ''}" data-tag="${tag}">
                    ${tag}
                </button>
            `).join('');
            el.querySelectorAll('.filter-chip').forEach(btn => {
                btn.onclick = () => {
                    const tag = btn.dataset.tag;
                    const idx = state.tags.indexOf(tag);
                    if (idx >= 0) state.tags.splice(idx, 1);
                    else state.tags.push(tag);
                    updateHash();
                    render();
                };
            });
        }
        
        function getSourceColor(sourceId) {
            if (!data || !data.sources) return '#78716c';
            const src = data.sources.find(s => s.id === sourceId);
            return src ? src.color : '#78716c';
        }
        
        function extractDomain(url) {
            try {
                const u = new URL(url);
                return u.hostname.replace('www.', '');
            } catch { return ''; }
        }
        
        function renderRefs() {
            const refs = filterRefs();
            const el = document.getElementById('ref-list');
            
            // Update list classes based on state
            el.className = 'ref-list';
            if (state.viewMode === 'grid') el.classList.add('grid-view');
            if (state.showPreviews) el.classList.add('show-previews');
            
            if (refs.length === 0) {
                el.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">⌀</div>
                        <div class="empty-title">No references match your filters</div>
                        <div class="empty-desc">Try adjusting your search or clearing filters with <kbd>Esc</kbd></div>
                    </div>
                `;
                return;
            }
            el.innerHTML = refs.map((ref, idx) => {
                const color = getSourceColor(ref.source);
                const initials = (ref.sourceLabel || ref.source || '??').substring(0, 2).toUpperCase();
                
                // Image is always in DOM, visibility controlled by CSS
                let imgContent;
                if (ref.img) {
                    imgContent = `<img class="ref-image" src="${ref.img}" loading="lazy" alt="" onerror="this.classList.add('error')">`;
                } else {
                    imgContent = `<div class="ref-placeholder" style="background: ${color}">
                        <span class="placeholder-label">${initials}</span>
                    </div>`;
                }
                const imgHtml = `<div class="ref-image-wrap">${imgContent}</div>`;
                
                const tagHtml = ref.tag ? `<span class="ref-tag">${ref.tag}</span>` : '';
                
                let qualityHtml = '';
                const quality = ref.urlQuality || 0.5;
                if (quality >= 0.9) {
                    qualityHtml = '<span class="quality-badge quality-high" title="Individual page">★</span>';
                } else if (quality <= 0.1) {
                    qualityHtml = '<span class="quality-badge quality-low" title="Collection page">⚠</span>';
                }
                
                const domain = extractDomain(ref.url);
                
                return `
                    <a href="${ref.url}" target="_blank" rel="noopener" class="ref-item" data-quality="${quality}">
                        <span class="ref-index">${idx + 1}</span>
                        ${imgHtml}
                        <div class="ref-content">
                            <div class="ref-header">
                                <span class="ref-title">${ref.title}</span>
                                ${qualityHtml}
                                ${tagHtml}
                            </div>
                            ${ref.desc ? `<div class="ref-desc">${ref.desc}</div>` : ''}
                            <div class="ref-meta">
                                <span class="ref-source" style="color: ${color}">
                                    <span class="source-dot" style="background: ${color}"></span>
                                    ${ref.sourceLabel}
                                </span>
                                <span class="ref-url">${domain}</span>
                            </div>
                        </div>
                        <span class="ref-arrow">↗</span>
                    </a>
                `;
            }).join('');
        }
        
        function render() {
            renderSidebar();
            renderSourceChips();
            renderTagChips();
            renderRefs();
        }
        
        function updateToolbar() {
            const previewToggle = document.getElementById('toggle-previews');
            
            // Disable preview toggle in grid view (grid always shows images)
            if (state.viewMode === 'grid') {
                previewToggle.classList.add('active');
                previewToggle.classList.add('disabled');
                previewToggle.setAttribute('title', 'Previews always shown in grid view');
            } else {
                previewToggle.classList.toggle('active', state.showPreviews);
                previewToggle.classList.remove('disabled');
                previewToggle.setAttribute('title', 'Toggle image previews');
            }
            
            // View mode buttons
            document.getElementById('view-list').classList.toggle('active', state.viewMode === 'list');
            document.getElementById('view-grid').classList.toggle('active', state.viewMode === 'grid');
        }
        
        // Initialize
        init();
        updateToolbar();
        
        // Search
        const searchInput = document.getElementById('search');
        searchInput.value = state.search;
        searchInput.oninput = () => {
            state.search = searchInput.value;
            updateHash();
            renderRefs();
        };
        
        // Keyboard shortcuts
        document.addEventListener('keydown', e => {
            if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                e.preventDefault();
                searchInput.focus();
                searchInput.select();
            }
            if (e.key === 'Escape') {
                if (document.activeElement === searchInput) {
                    searchInput.blur();
                } else {
                    state.search = '';
                    state.sources = [];
                    state.tags = [];
                    searchInput.value = '';
                    updateHash();
                    render();
                }
            }
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                if (document.activeElement === searchInput) return;
                if (!data || !data.categories) return;
                const cats = data.categories;
                const idx = cats.findIndex(c => c.id === state.category);
                const newIdx = e.key === 'ArrowLeft' ? 
                    (idx - 1 + cats.length) % cats.length : 
                    (idx + 1) % cats.length;
                state.category = cats[newIdx].id;
                updateHash();
                render();
            }
            // P for preview toggle (only in list view)
            if (e.key === 'p' && document.activeElement !== searchInput && state.viewMode === 'list') {
                state.showPreviews = !state.showPreviews;
                updateToolbar();
                updateHash();
                renderRefs();
            }
            // G for grid toggle
            if (e.key === 'g' && document.activeElement !== searchInput) {
                state.viewMode = state.viewMode === 'list' ? 'grid' : 'list';
                updateToolbar();
                updateHash();
                renderRefs();
            }
        });
        
        // Toggle previews (only works in list view)
        document.getElementById('toggle-previews').onclick = () => {
            if (state.viewMode === 'grid') return; // Disabled in grid view
            state.showPreviews = !state.showPreviews;
            updateToolbar();
            updateHash();
            renderRefs();
        };
        
        // View mode buttons
        document.getElementById('view-list').onclick = () => {
            state.viewMode = 'list';
            updateToolbar();
            updateHash();
            renderRefs();
        };
        
        document.getElementById('view-grid').onclick = () => {
            state.viewMode = 'grid';
            updateToolbar();
            updateHash();
            renderRefs();
        };
        
        // Hash change
        window.addEventListener('hashchange', () => {
            parseHash();
            render();
            updateToolbar();
        });
    </script>
